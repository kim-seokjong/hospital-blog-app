<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오류</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #fef2f2; color: #374151; }
    .box { text-align: center; padding: 40px; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h2 { color: #991b1b; margin-bottom: 8px; }
    p { color: #6b7280; margin-bottom: 24px; font-size: 14px; }
    button { padding: 12px 28px; background: #2563eb; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">⚠️</div>
    <h2>서버 시작 실패</h2>
    <p>앱 서버를 시작하는 데 실패했습니다.<br>앱을 재시작하거나 API 키를 다시 확인해주세요.</p>
    <button onclick="window.electronAPI.saveConfig && location.reload()">다시 시도</button>
  </div>
</body>
</html>
